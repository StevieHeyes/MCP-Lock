name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # fmt, clippy (warnings denied), and tests. Runs on macOS because v1 targets
  # macOS only: the platform providers and their fail-closed tests compile and
  # run under `cfg(target_os = "macos")`, so macOS is the runner that actually
  # exercises them. The toolchain is pinned by rust-toolchain.toml.
  check:
    name: fmt / clippy / test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version
          cargo fmt --version
          cargo clippy --version

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --workspace --all-features

  # Dependency vetting: advisories, license policy, supply-chain sources.
  # Trivial today (no external deps) but guards the first one that lands.
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  # Secret scanning over the full git history. Pinned gitleaks version, run as a
  # plain CLI so there is no third-party action with opaque behaviour on the
  # security-sensitive path. Fails the build if any secret is detected.
  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install and run gitleaks
        env:
          GITLEAKS_VERSION: "8.18.4"
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --redact --verbose --exit-code 1
